{% extends 'base.html' %}

{% block content %}
<div class="container my-4">
    <h2 class="mb-4 text-center">Рецензия на книгу «{{ book.name }}»</h2>
    <form method="POST" action="{{ url_for('books.create_review', book_id=book.id) }}">
        <div class="mb-3">
            <label class="form-label" for="rating">Оценка</label>
            <select class="form-select" name="rating" id="rating">
                <option value="5" selected>отлично</option>
                <option value="4">хорошо</option>
                <option value="3">удовлетворительно</option>
                <option value="2">неудовлетворительно</option>
                <option value="1">плохо</option>
                <option value="0">ужасно</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" for="text">Текст рецензии</label>
            <textarea class="form-control" name="text" id="text" rows="8"></textarea>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-dark">Сохранить</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
<script>new EasyMDE({ element: document.getElementById('text') });</script>
{% endblock %}
