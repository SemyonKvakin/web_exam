{% macro book_form_fields(book, genres, selected_genres, with_cover=False) %}
    <div class="mb-3">
        <label class="form-label" for="name">Название</label>
        <input class="form-control" type="text" name="name" id="name" value="{{ book.name or '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="author">Автор</label>
        <input class="form-control" type="text" name="author" id="author" value="{{ book.author or '' }}" required>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label" for="year">Год</label>
            <input class="form-control" type="number" name="year" id="year" value="{{ book.year or '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label" for="pages">Объём (страниц)</label>
            <input class="form-control" type="number" name="pages" id="pages" value="{{ book.pages or '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label" for="publisher">Издательство</label>
            <input class="form-control" type="text" name="publisher" id="publisher" value="{{ book.publisher or '' }}" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label" for="genre_ids">Жанры</label>
        <select class="form-select" name="genre_ids" id="genre_ids" multiple required>
            {% for genre in genres %}
                <option value="{{ genre.id }}" {% if genre.id in selected_genres %}selected{% endif %}>{{ genre.name }}</option>
            {% endfor %}
        </select>
    </div>
    {% if with_cover %}
        <div class="mb-3">
            <label class="form-label" for="cover">Обложка</label>
            <input class="form-control" type="file" name="cover" id="cover" accept="image/*" required>
        </div>
    {% endif %}
    <div class="mb-3">
        <label class="form-label" for="short_desc">Описание</label>
        <textarea class="form-control" name="short_desc" id="short_desc" rows="8">{{ book.short_desc or '' }}</textarea>
    </div>
{% endmacro %}
