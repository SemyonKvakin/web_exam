{% extends 'base.html' %}
{% from 'books/_form.html' import book_form_fields %}

{% block content %}
<div class="container my-4">
    <h2 class="mb-4 text-center">Добавление книги</h2>
    <form method="POST" action="{{ url_for('books.create') }}" enctype="multipart/form-data">
        {{ book_form_fields(book, genres, selected_genres, with_cover=True) }}
        <div class="text-center">
            <button type="submit" class="btn btn-dark">Сохранить</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
<script>new EasyMDE({ element: document.getElementById('short_desc') });</script>
{% endblock %}
