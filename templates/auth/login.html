{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="mb-4 text-center">Вход</h2>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label" for="login">Логин</label>
                    <input class="form-control" type="text" name="login" id="login" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Пароль</label>
                    <input class="form-control" type="password" name="password" id="password" required>
                </div>
                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me">
                    <label class="form-check-label" for="remember_me">Запомнить меня</label>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-dark w-100">Войти</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
