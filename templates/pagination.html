{% macro render_pagination(pagination, endpoint, args={}) %}
    {% if pagination.pages > 1 %}
        <nav>
            <ul class="pagination justify-content-center">
                <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
                    <a class="page-link" href="{{ url_for(endpoint, page=pagination.prev_num, **args) }}">&laquo;</a>
                </li>
                {% for p in pagination.iter_pages() %}
                    {% if p %}
                        <li class="page-item {% if p == pagination.page %}active{% endif %}">
                            <a class="page-link" href="{{ url_for(endpoint, page=p, **args) }}">{{ p }}</a>
                        </li>
                    {% else %}
                        <li class="page-item disabled"><span class="page-link">…</span></li>
                    {% endif %}
                {% endfor %}
                <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
                    <a class="page-link" href="{{ url_for(endpoint, page=pagination.next_num, **args) }}">&raquo;</a>
                </li>
            </ul>
        </nav>
    {% endif %}
{% endmacro %}
